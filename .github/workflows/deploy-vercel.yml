name: Deploy to Vercel on Release

on:
  release:
    types: [published]
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ Error: VERCEL_TOKEN secret is not set!"
            echo "Please add VERCEL_TOKEN to your GitHub repository secrets."
            echo "See GITHUB_ACTIONS_SETUP.md for instructions."
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "❌ Error: VERCEL_ORG_ID secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ Error: VERCEL_PROJECT_ID secret is not set!"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Assign Alias
        if: github.event_name == 'release'
        run: |
          RELEASE_TAG=${{ github.event.release.tag_name }}
          # Replace dots with dashes for valid Vercel subdomain (v1.0.0 -> v1-0-0)
          SAFE_TAG=$(echo "$RELEASE_TAG" | tr '.' '-')
          ALIAS_URL="expense-manager-${SAFE_TAG}.vercel.app"
          PROD_ALIAS="expense-manager-prod.vercel.app"
          
          # Remove release alias if it exists
          echo "Checking for existing release alias..."
          vercel alias rm $ALIAS_URL --token="${{ secrets.VERCEL_TOKEN }}" --yes 2>/dev/null || echo "No existing release alias to remove"
          
          # Set release alias
          vercel alias set ${{ steps.deploy.outputs.deployment_url }} $ALIAS_URL --token="${{ secrets.VERCEL_TOKEN }}"
          echo "✅ Release alias set to: $ALIAS_URL"
          
          # Try to set production alias (non-fatal if taken by another user)
          echo "Attempting to set production alias..."
          vercel alias rm $PROD_ALIAS --token="${{ secrets.VERCEL_TOKEN }}" --yes 2>/dev/null || true
          
          if vercel alias set ${{ steps.deploy.outputs.deployment_url }} $PROD_ALIAS --token="${{ secrets.VERCEL_TOKEN }}" 2>/dev/null; then
            echo "✅ Production alias set to: $PROD_ALIAS"
          else
            echo "⚠️  Production alias '$PROD_ALIAS' is unavailable (likely taken by another project)"
            echo "✅ Your release is accessible at: https://${ALIAS_URL}"
          fi

      - name: Comment on Release
        if: github.event_name == 'release'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseTag = context.payload.release.tag_name;
            const safeTag = releaseTag.replace(/\./g, '-');
            const deploymentUrl = '${{ steps.deploy.outputs.deployment_url }}';
            const aliasUrl = `expense-manager-${safeTag}.vercel.app`;
            
            // Comment on the release
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.release.id,
              body: `🚀 **Deployment Successful!**\n\n✅ **Production URL**: https://expense-manager-prod.vercel.app\n✅ **Release Alias**: https://${aliasUrl}\n✅ **Direct URL**: ${deploymentUrl}\n\nYour release has been deployed to Vercel!`
            });

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment URL**: ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "release" ]; then
            RELEASE_TAG=${{ github.event.release.tag_name }}
            SAFE_TAG=$(echo "$RELEASE_TAG" | tr '.' '-')
            echo "- **Release Alias**: https://expense-manager-${SAFE_TAG}.vercel.app" >> $GITHUB_STEP_SUMMARY
            echo "- **Production Alias**: https://expense-manager-prod.vercel.app" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
